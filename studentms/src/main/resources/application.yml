spring:
   application:
       name: studentms
       
server:
   port: 8081

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
      
resilience4j:
  circuitbreaker:
    instances:
      feesmsclient:
        slidingWindowType: COUNT_BASED
        failureRateThreshold: 50
        slidingWindowSize: 10
        waitDurationInOpenState: 20s
        permittedNumberOfCallsInHalfOpenState: 3
        minimumNumberOfCalls: 5
